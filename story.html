<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#ff6eb4,#ff2d78);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:50px 20px;
  font-size:2.5rem;
  font-family:'Playfair Display', serif;
}

/* PARALLAX */
.parallax-bg{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

.circle{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  background: rgba(255,255,255,0.08);
}

/* SECTION */
.section{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
  max-width:900px;
  margin:100px auto;
  padding:30px;
  background: rgba(255,255,255,0.1);
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.section:nth-child(even){
  flex-direction:row-reverse;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* IMAGE */
.story-img{
  width:240px;
  height:300px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.4s;
}

.story-img:hover{
  transform:scale(1.05);
}

/* TEXT */
.text{
  max-width:400px;
}

.title{
  font-size:1.5rem;
  margin-bottom:10px;
  font-family:'Playfair Display', serif;
}

.desc{
  line-height:1.8;
  white-space:pre-line;
}

/* HEART */
.heart{
  position:fixed;
  bottom:-20px;
  animation:floatUp linear;
}

@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-100vh);opacity:0;}
}

/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff2d78;
  cursor:pointer;
  font-weight:bold;
  z-index:1000;
}

/* MOBILE */
@media(max-width:768px){
  .section{
    flex-direction:column !important;
    text-align:center;
  }
}

</style>
</head>

<body>

<button class="music-btn" onclick="startMusic()">▶ Play Music</button>

<div class="parallax-bg">
  <div class="circle" style="top:10%; left:20%;"></div>
  <div class="circle" style="top:60%; left:70%;"></div>
  <div class="circle" style="top:30%; left:80%;"></div>
</div>

<div class="header">Our Story 💖</div>

<!-- STORY SECTIONS -->

<div class="section">
  <img src="10thstd.jpeg" class="story-img">
  <div class="text">
    <div class="title">10th Standard 🌸</div>
    <div class="desc" data-text="Sab kuch shayad tab start hua tha...
Tu difficult phase me thi...
Aur main bas side se dekh raha tha...
Mujhe tu tabhi pasand thi... par kabhi dikhaya nahi ❤️"></div>
  </div>
</div>

<div class="section">
  <img src="friendsplan.jpeg" class="story-img">
  <div class="text">
    <div class="title">Friend Plan 😌</div>
    <div class="desc" data-text="Maine Ayush se friendship bhi isi liye kari...
Roz tujhe 2km tak ghar chhodne jaata tha...
Sirf isliye... tu safe rahe ❤️"></div>
  </div>
</div>

<div class="section">
  <img src="hug.jpeg" class="story-img">
  <div class="text">
    <div class="title">That Hug 🎂</div>
    <div class="desc" data-text="Tune mujhe hug kiya... first time 🥺
Aur ussi din tu chali gayi...
Main bas wahi reh gaya..."></div>
  </div>
</div>

<div class="section">
  <img src="4months.png" class="story-img">
  <div class="text">
    <div class="title">4 Months ⏳</div>
    <div class="desc" data-text="4 months tak hum mile hi nahi...
Par ek cheez kabhi kam nahi hui...
Tere baare me sochna 💭"></div>
  </div>
</div>

<div class="section">
  <img src="birla.jpeg" class="story-img">
  <div class="text">
    <div class="title">Birla 💫</div>
    <div class="desc" data-text="Aur jab tu aayi...
Bhai... happiest moment ❤️"></div>
  </div>
</div>

<div class="section">
  <img src="moments.jpeg" class="story-img">
  <div class="text">
    <div class="title">Our Moments 💖</div>
    <div class="desc" data-text="Prem Auto tak walks...
Shawarma... Juice center...
Fest... assignments... auto rides...
Sab normal tha...
Par sab special tha... because you ❤️"></div>
  </div>
</div>

<div class="section">
  <img src="closestphase.jpeg" class="story-img">
  <div class="text">
    <div class="title">Closest Phase 🫶</div>
    <div class="desc" data-text="Gym pics... food pics... VC... late night chats...
Ganpati wali first date 💖
Vangani bunks... chocolates... flirting...
Aur haan... tujhe padhata bhi tha 😌"></div>
  </div>
</div>

<div class="section">
  <img src="truth.jpeg" class="story-img">
  <div class="text">
    <div class="title">Truth 💭</div>
    <div class="desc" data-text="Kabhi directly nahi bola...
Par har cheez me tha...
Mujhe tu pasand hai ❤️
Aur aaj bhi... it was always you 😌"></div>
  </div>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="tumhiho.mp3" type="audio/mp3">
</audio>

<script>

/* MUSIC */
function startMusic(){
  const music = document.getElementById("music");
  music.play().catch(()=>{});
}

/* AUTO START ON FIRST CLICK */
document.body.addEventListener("click", startMusic, { once:true });

/* SCROLL OBSERVER */
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');

      const el = entry.target.querySelector('.desc');

      if(!el.classList.contains("typed")){
        typeText(el);
        el.classList.add("typed");
      }
    }
  });
},{threshold:0.3});

sections.forEach(sec=> observer.observe(sec));

/* TYPEWRITER */
function typeText(el){
  let content = el.getAttribute("data-text");
  let i = 0;

  function typing(){
    if(i < content.length){
      el.innerHTML += content.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }
  typing();
}

/* PARALLAX */
window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".circle").forEach((el,i)=>{
    let speed = (i+1)*0.2;
    el.style.transform = `translateY(${window.scrollY * speed}px)`;
  });
});

/* HEARTS */
setInterval(()=>{
  const heart = document.createElement("div");
  heart.className="heart";
  heart.innerText="💖";

  heart.style.left = Math.random()*100+"vw";
  heart.style.fontSize = (15 + Math.random()*20)+"px";

  let duration = 4 + Math.random()*3;
  heart.style.animationDuration = duration+"s";

  document.body.appendChild(heart);

  setTimeout(()=> heart.remove(), duration*1000);
}, 1200);

</script>

</body>
</html>
